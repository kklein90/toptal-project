name: Deploy to prod

on:
  workflow_dispatch:

  # push:
  #   branches:
  #     - main

jobs:
  build:
    name: Build Containers
    runs-on: [ubuntu-latest]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: node-3tier-app2/web
          file: node-3tier-app2/web/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USER }}/toptal-web:latest

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: node-3tier-app2/api
          file: node-3tier-app2/api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USER }}/toptal-api:latest
